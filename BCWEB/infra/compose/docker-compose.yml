# BetterCommunity Web — full stack, one command: `docker compose up -d`.
# Copy .env.example -> .env and fill the secrets first.

name: bcweb

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bcweb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-bcweb}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bcweb}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis-data:/data

  # S3-compatible object storage for catalog payloads, preset .json, repo data.
  # Port 9000 is exposed so the browser can PUT/GET via pre-signed URLs (the
  # signature is bound to the public host — see S3_PUBLIC_ENDPOINT).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set in .env}
    volumes:
      - minio-data:/data

  api:
    build:
      context: ../..                 # BCWEB root (needs packages/db)
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bcweb}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bcweb}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-bcweb}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET:?set in .env}
      SITE_URL: ${SITE_URL:-http://localhost}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      LINK_LOOKUP_SECRET: ${LINK_LOOKUP_SECRET:-dev-link-secret}
      DISCORD_CONTACT_WEBHOOK: ${DISCORD_CONTACT_WEBHOOK:-}
      BOT_SHARED_SECRET: ${BOT_SHARED_SECRET:-${LINK_LOOKUP_SECRET:-dev-bot-secret}}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      NODE_ENV: production

  # Watches for PROVISIONING repos and brings them ONLINE (isolation/quota owner).
  provisioner:
    build:
      context: ../..
      dockerfile: apps/provisioner/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bcweb}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bcweb}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-bcweb}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      REPO_PUBLIC_BASE: ${REPO_PUBLIC_BASE:-http://localhost/repos}

  web:
    build:
      context: ../../apps/web
      args:
        VITE_GTM_ID: ${VITE_GTM_ID:-}
    restart: unless-stopped
    depends_on: [api]

  # BetterCommunity Discord bot. Idle (exits 0) unless DISCORD_TOKEN is set in .env.
  bot:
    build: ../../apps/bot
    restart: unless-stopped
    depends_on: [api]
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      BCWEB_API_URL: http://api:3000
      SITE_URL: ${SITE_URL:-http://localhost}
      BOT_SHARED_SECRET: ${BOT_SHARED_SECRET:-${LINK_LOOKUP_SECRET:-dev-bot-secret}}

  # Dedicated Postgres for the telemetry dashboard (kept isolated from the app DB).
  telemetry-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bmm
      POSTGRES_PASSWORD: bmm
      POSTGRES_DB: telemetry
    volumes:
      - telemetry-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bmm -d telemetry"]
      interval: 5s
      timeout: 3s
      retries: 20

  # BMM telemetry dashboard (moved into bmm/), listens on 8900, reachable at /telemetry.
  telemetry:
    build: ../../bmm/telemetry-dashboard
    restart: unless-stopped
    depends_on:
      telemetry-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://bmm:bmm@telemetry-db:5432/telemetry
      PORT: "8900"
      API_KEY: ${TELEMETRY_API_KEY:-change-me}
      ADMIN_KEY: ${TELEMETRY_ADMIN_KEY:-change-me-admin}
      STATIC_DIR: /app/public
      # Resolve creator ids → linked BetterCommunity accounts (server-to-server).
      BC_API_URL: http://api:3000
      BC_LINK_SECRET: ${LINK_LOOKUP_SECRET:-dev-link-secret}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    depends_on: [api, web]
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-http://localhost}
      TELEMETRY_DOMAIN: ${TELEMETRY_DOMAIN:-http://telemetry.localhost}
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  redis-data:
  minio-data:
  telemetry-data:
  caddy-data:
  caddy-config:

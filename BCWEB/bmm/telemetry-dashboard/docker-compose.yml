# BMM Telemetry — one command up: Postgres + Axum API + React dashboard.
#   docker compose up --build
# Data lives in the `pgdata` volume, so restarts keep every past event.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bmm
      POSTGRES_PASSWORD: bmm
      POSTGRES_DB: telemetry
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bmm -d telemetry"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://bmm:bmm@db:5432/telemetry
      PORT: "8900"
      API_KEY: ${API_KEY:-change-me}
      ADMIN_KEY: ${ADMIN_KEY:-change-me-admin}
      RETENTION_DAYS: ${RETENTION_DAYS:-180}
      DELETE_DELAY_H: ${DELETE_DELAY_H:-72}
      RATE_PER_MIN: ${RATE_PER_MIN:-240}
      MAX_BATCH: ${MAX_BATCH:-1000}
      STATIC_DIR: /app/public
    ports:
      - "8900:8900"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

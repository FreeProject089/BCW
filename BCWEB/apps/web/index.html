<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />

  <meta name="theme-color" content="#f97316" />

  <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"Organization","name":"BetterCommunity","url":"https://bettercommunity.ch/","logo":"https://bettercommunity.ch/logo.png","sameAs":["https://github.com/FreeProject089","https://discord.com/invite/CTaaEF9R75"]}

  <script>

    try { document.documentElement.setAttribute('data-theme', localStorage.getItem('bcw_theme') || 'light'); } catch (e) {}

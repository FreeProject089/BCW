server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed build assets (…-A1b2C3d4.js/.css) are content-addressed, so they can be
  # cached forever — a change ships a new filename. Big win for repeat visits and
  # for the benchmark's static path.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html must NOT be cached, or clients keep loading a stale shell that
  # points at deleted asset hashes after a deploy.
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # SPA: client-side routing falls back to index.html. (Caddy handles /api + /telemetry.)
  location / { try_files $uri $uri/ /index.html; }
}
